name: Docs Build

on:
    push:
        branches:
            - master
            - dev
    pull_request:
        types: [opened, synchronize]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: pip install ".[docs]"

            - name: Build documentation
              run: mkdocs build
