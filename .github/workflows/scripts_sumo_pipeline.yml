name: SUMO Pipeline

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize]

jobs:
  run-script:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install SUMO and netconvert
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sumo/stable
          sudo apt-get install -y sumo sumo-tools
          echo "SUMO_HOME=/usr/share/sumo" >> $GITHUB_ENV
      - name: Verify that installation was successful
        run: |
          sumo --version
          netconvert --version
      - name: Run demo scenario (default location) with SUMO pipeline
        run: python -m src.demo.run_pipeline --vehicle-demand 1000 --no-plot
      - name: Run demo scenario (provided SUMO files) with SUMO pipeline
        run: python -m src.demo.run_pipeline --sumo-cfg-dir "src/demo/scenarios/example" --no-plot
