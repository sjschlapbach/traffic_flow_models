name: Docs Release

on:
    push:
        tags:
            - "v*.*.*"

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install dependencies
              run: pip install ".[docs]"

            - name: Deploy to GitHub Pages
              run: mkdocs gh-deploy
