name: Type Checking & Linting

on:
    push:
        branches:
            - master
            - dev
    pull_request:
        types: [opened, synchronize]

jobs:
    lint:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.13]
        steps:
            - uses: actions/checkout@v5
            - name: Set up Python 3.13
              uses: actions/setup-python@v6
              with:
                  python-version: 3.13
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"
            - name: Run python linting for entire source directory
              run: pylint src --errors-only
            - name: Run python linting for entire tests directory
              run: pylint tests --errors-only
