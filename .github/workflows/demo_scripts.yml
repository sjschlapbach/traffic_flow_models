name: Demo Scripts

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize]

jobs:
  demo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Plot simple network structure
        run: python -m src.demo.plot_network --no-plot
      - name: Run CTM simulation demo
        run: python -m src.demo.ctm_simulation --no-plot
      - name: Run METANET simulation demo
        run: python -m src.demo.metanet_simulation --no-plot
