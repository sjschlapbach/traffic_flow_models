name: Demo Scripts

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize]

jobs:
  scripts:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install SUMO and netconvert
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:sumo/stable
          sudo apt-get install -y sumo sumo-tools
          echo "SUMO_HOME=/usr/share/sumo" >> $GITHUB_ENV
      - name: Verify that installation was successful
        run: |
          sumo --version
          netconvert --version
      - name: Plot simple network structure
        run: python -m src.demo.plot_demo_network --no-plot
      - name: Run CTM simulation demos
        run: |
          python -m src.demo.ctm_simulation --no-plot --scenario A
          python -m src.demo.ctm_simulation --no-plot --scenario B
          python -m src.demo.ctm_simulation --no-plot --scenario C
          python -m src.demo.ctm_simulation --no-plot --scenario C1
          python -m src.demo.ctm_simulation --no-plot --scenario C2
          python -m src.demo.ctm_simulation --no-plot --scenario C3
          python -m src.demo.ctm_simulation --no-plot --scenario C4
          python -m src.demo.ctm_simulation --no-plot --scenario D
      - name: Run METANET simulation demos
        run: |
          python -m src.demo.metanet_simulation --no-plot --scenario A
          python -m src.demo.metanet_simulation --no-plot --scenario B
          python -m src.demo.metanet_simulation --no-plot --scenario C
          python -m src.demo.metanet_simulation --no-plot --scenario C1
          python -m src.demo.metanet_simulation --no-plot --scenario C2
          python -m src.demo.metanet_simulation --no-plot --scenario C3
          python -m src.demo.metanet_simulation --no-plot --scenario C4
          python -m src.demo.metanet_simulation --no-plot --scenario D
      - name: Run METANET calibration demo
        run: python -m src.demo.metanet_calibration
      - name: Run Zurich demo scenario with SUMO pipeline
        run: python -m src.demo.pipeline_run_zurich --vehicle-demand 1000 --no-plot
